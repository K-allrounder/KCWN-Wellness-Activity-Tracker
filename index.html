<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KCWN Wellness - 실시간 운동 인증</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        /* Sticky Layout */
        .sticky-col { 
            position: sticky; 
            left: 0; 
            background-color: white; 
            z-index: 10; 
            border-right: 2px solid #f1f5f9; 
        }
        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 20; 
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .stat-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        
        /* Highlights */
        .today-header { background-color: #10b981 !important; color: white !important; }
        .today-cell { background-color: #ecfdf5 !important; }
        
        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="dumbbell" class="text-emerald-500"></i>
                    KCWN Wellness
                </h1>
                <p class="text-slate-500 mt-1 font-medium italic text-sm">"3월 월/수/금 챌린지 - 실시간 인증 보드 🚀"</p>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="relative group flex-1 md:flex-none">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4 group-focus-within:text-emerald-500 transition-colors"></i>
                    <input type="text" id="searchInput" placeholder="이름 검색..." 
                           class="pl-9 pr-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500/20 w-full md:w-48 text-sm shadow-sm transition-all">
                </div>
                <button onclick="toggleModal(true)" class="flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-xl hover:bg-slate-800 transition-all text-sm font-medium shadow-md">
                    <i data-lucide="users-round" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">참가자 관리</span>
                </button>
            </div>
        </header>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
            <div class="stat-card bg-indigo-600 p-6 rounded-2xl shadow-lg shadow-indigo-200/50 flex items-center gap-5 text-white">
                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-white backdrop-blur-md">
                    <i data-lucide="users" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-indigo-100 uppercase tracking-widest opacity-80">전체 멤버</p>
                    <h2 class="text-3xl font-bold" id="statTotalMembers">0명</h2>
                </div>
            </div>
            <div class="stat-card bg-emerald-500 p-6 rounded-2xl shadow-lg shadow-emerald-200/50 flex items-center gap-5 text-white">
                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-white backdrop-blur-md">
                    <i data-lucide="calendar-check" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-emerald-100 uppercase tracking-widest opacity-80">오늘 인증</p>
                    <h2 class="text-3xl font-bold" id="statTodayCount">0명</h2>
                </div>
            </div>
            <div class="stat-card bg-violet-600 p-6 rounded-2xl shadow-lg shadow-violet-200/50 flex items-center gap-5 text-white">
                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-white backdrop-blur-md">
                    <i data-lucide="medal" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-violet-100 uppercase tracking-widest opacity-80">최고 챌린저</p>
                    <h2 class="text-2xl font-bold truncate max-w-[140px]" id="statTopChallenger">-</h2>
                </div>
            </div>
        </div>

        <!-- Main Board -->
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto overflow-y-auto max-h-[600px]" id="tableContainer">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky-header">
                        <tr class="bg-slate-50 border-b border-slate-200" id="headerRow">
                            <th class="p-5 font-bold text-slate-800 min-w-[160px] sticky-col bg-slate-50 border-r border-slate-100 shadow-sm">참가자 이름</th>
                        </tr>
                    </thead>
                    <tbody id="participantList">
                        <tr><td colspan="20" class="p-20 text-center text-slate-400 font-medium italic">데이터를 동기화 중입니다...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="statusToast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl z-50">
            <div id="statusIcon" class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
            <span id="statusText" class="text-sm font-medium">동기화 완료</span>
        </div>
    </div>

    <!-- Management Modal -->
    <div id="nameModal" class="fixed inset-0 z-[100] modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-900">참가자 명단 관리</h3>
                <button onclick="toggleModal(false)" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="newNameInput" placeholder="새 참가자 이름 입력" 
                           class="flex-1 px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500/20 text-sm">
                    <button onclick="addParticipant()" class="bg-emerald-500 text-white px-5 py-2 rounded-xl hover:bg-emerald-600 transition-all font-semibold text-sm">추가</button>
                </div>
                <div id="modalParticipantList" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                </div>
            </div>
            <div class="p-4 bg-slate-50 text-right">
                <button onclick="toggleModal(false)" class="text-slate-600 font-semibold px-4 py-2 hover:bg-slate-200 rounded-xl transition-all">닫기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCjMWqInoMGONkBbDK86OyqqUcIyXINknc",
            authDomain: "tracker-2c61c.firebaseapp.com",
            projectId: "tracker-2c61c",
            storageBucket: "tracker-2c61c.firebasestorage.app",
            messagingSenderId: "811271683724",
            appId: "1:811271683724:web:47d0fa80ba8be2752305a9",
            measurementId: "G-ELGP06WBTG"
        };

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbywqvmKI66caoF7WBuNpvPa223GOkAF4wDOgPFwvAVHTHMQZbtycQcZS0kWsJQpROf_/exec";
        const appId = firebaseConfig.projectId;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeParticipants = [];
        let checkData = {};
        let searchTerm = "";

        // Generate Dates (3/4 ~ 3/30, Mon/Wed/Fri, Today first)
        const generateDates = () => {
            const dates = [];
            const start = new Date(2026, 2, 4);
            const end = new Date(2026, 2, 30);
            const today = new Date();
            today.setHours(0,0,0,0);

            let current = new Date(start);
            while (current <= end) {
                const day = current.getDay(); // 1:Mon, 3:Wed, 5:Fri
                if ([1, 3, 5].includes(day)) { dates.push(new Date(current)); }
                current.setDate(current.getDate() + 1);
            }

            // Sort: Today first, then chronological
            dates.sort((a, b) => {
                const isTodayA = a.getTime() === today.getTime();
                const isTodayB = b.getTime() === today.getTime();
                if (isTodayA) return -1;
                if (isTodayB) return 1;
                return a - b;
            });
            return dates;
        };
        const dateRange = generateDates();

        // Initialize Real-time Sync
        async function startApp() {
            try {
                await signInAnonymously(auth);

                // Sync Participants
                const pCol = collection(db, 'artifacts', appId, 'public', 'data', 'participants');
                onSnapshot(pCol, (snapshot) => {
                    activeParticipants = [];
                    snapshot.forEach(doc => activeParticipants.push(doc.data().name));
                    activeParticipants.sort();
                    renderAll();
                    renderModalList();
                });

                // Sync Checks
                const cCol = collection(db, 'artifacts', appId, 'public', 'data', 'checks');
                onSnapshot(cCol, (snapshot) => {
                    checkData = {};
                    snapshot.forEach(doc => {
                        const [name, date] = doc.id.split('___');
                        if (!checkData[name]) checkData[name] = {};
                        checkData[name][date] = doc.data().status;
                    });
                    renderAll();
                });

            } catch (err) {
                console.error("Firebase Error:", err);
            }
        }

        // Main Rendering
        function renderAll() {
            const headerRow = document.getElementById('headerRow');
            const participantList = document.getElementById('participantList');
            const todayStr = new Date().toLocaleDateString('ko-KR');

            // Header Rendering
            while (headerRow.cells.length > 1) { headerRow.deleteCell(1); }
            dateRange.forEach((date, idx) => {
                const dateStr = date.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric', weekday: 'short' });
                const isToday = date.toLocaleDateString('ko-KR') === todayStr;
                const th = document.createElement('th');
                const isFirstToday = isToday && idx === 0;

                th.className = `p-4 text-center min-w-[110px] text-xs font-bold border-b-2 transition-all ${
                    isFirstToday ? 'today-header shadow-lg' : isToday ? 'text-emerald-600 bg-emerald-50 border-emerald-500' : 'text-slate-400 border-transparent'
                }`;
                th.innerHTML = `
                    <div class="flex flex-col items-center">
                        ${isToday ? '<span class="text-[8px] uppercase font-black tracking-widest opacity-80 mb-1 animate-pulse">Checking</span>' : ''}
                        <span>${dateStr}</span>
                    </div>
                `;
                headerRow.appendChild(th);
            });

            // Participant Rows Rendering
            participantList.innerHTML = '';
            const filtered = activeParticipants.filter(p => p.toLowerCase().includes(searchTerm.toLowerCase()));
            
            if (filtered.length === 0) {
                participantList.innerHTML = `<tr><td colspan="${dateRange.length + 1}" class="p-20 text-center text-slate-400 font-medium italic">참가자가 없습니다.</td></tr>`;
                return;
            }

            filtered.forEach(name => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50/80 transition-colors group";
                
                const nameTd = document.createElement('td');
                nameTd.className = "p-5 font-bold text-slate-700 sticky-col border-r border-slate-50 group-hover:text-emerald-600 transition-colors";
                nameTd.innerText = name;
                tr.appendChild(nameTd);

                dateRange.forEach((date, idx) => {
                    const dateKey = date.toISOString().split('T')[0];
                    const isToday = date.toLocaleDateString('ko-KR') === todayStr;
                    const td = document.createElement('td');
                    const cellHighlight = (isToday && idx === 0) ? 'today-cell border-x border-emerald-100' : isToday ? 'bg-emerald-50/30' : '';
                    td.className = `p-4 text-center transition-colors ${cellHighlight}`;
                    
                    const cb = document.createElement('input');
                    cb.type = "checkbox";
                    cb.checked = checkData[name]?.[dateKey] || false;
                    cb.className = "w-7 h-7 rounded-xl border-slate-300 text-emerald-500 cursor-pointer accent-emerald-500 transition-transform active:scale-90 shadow-sm";
                    cb.onchange = () => toggleCheck(name, dateKey, cb.checked);
                    
                    td.appendChild(cb);
                    tr.appendChild(td);
                });
                participantList.appendChild(tr);
            });

            updateDashboard();
            lucide.createIcons();
        }

        // Actions
        async function toggleCheck(name, date, status) {
            showToast("데이터 전송 중...", "sync");
            const docId = `${name}___${date}`;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'checks', docId);
            
            try {
                await setDoc(docRef, { name, date, status, updatedAt: new Date().toISOString() });
                // Google Sheets Backup
                fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, date, status, ts: new Date().toISOString() }) });
                showToast("공유 완료", "success");
            } catch (err) {
                showToast("저장 실패", "error");
            }
        }

        window.addParticipant = async () => {
            const input = document.getElementById('newNameInput');
            const name = input.value.trim();
            if (!name || activeParticipants.includes(name)) return;
            showToast("추가 중...", "sync");
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'participants', name);
                await setDoc(docRef, { name, createdAt: new Date().toISOString() });
                input.value = "";
                showToast("참가자 추가됨", "success");
            } catch (err) {
                showToast("추가 실패", "error");
            }
        };

        window.deleteParticipant = async (name) => {
            if (!confirm(`${name}님을 삭제하시겠습니까? 데이터가 모두 지워집니다.`)) return;
            showToast("삭제 중...", "sync");
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'participants', name);
                await deleteDoc(docRef);
                showToast("삭제 완료", "success");
            } catch (err) {
                showToast("삭제 실패", "error");
            }
        };

        // Modal Helpers
        window.toggleModal = (show) => {
            document.getElementById('nameModal').classList.toggle('hidden', !show);
            if (show) renderModalList();
        };

        function renderModalList() {
            const container = document.getElementById('modalParticipantList');
            container.innerHTML = '';
            activeParticipants.forEach(name => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-3.5 bg-slate-50 rounded-2xl border border-slate-100 mb-2";
                div.innerHTML = `
                    <span class="font-bold text-slate-700">${name}</span>
                    <button onclick="deleteParticipant('${name}')" class="text-rose-400 p-2 hover:bg-rose-50 rounded-xl transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function updateDashboard() {
            const todayKey = new Date().toISOString().split('T')[0];
            let todayCount = 0, counts = {};
            activeParticipants.forEach(name => {
                Object.keys(checkData[name] || {}).forEach(date => {
                    if (checkData[name][date]) {
                        counts[name] = (counts[name] || 0) + 1;
                        if (date === todayKey) todayCount++;
                    }
                });
            });
            document.getElementById('statTotalMembers').innerText = `${activeParticipants.length}명`;
            document.getElementById('statTodayCount').innerText = `${todayCount}명`;
            let max = 0, top = "-";
            for (let n in counts) if (counts[n] > max) { max = counts[n]; top = n; }
            document.getElementById('statTopChallenger').innerText = top !== "-" ? `${top} (${max}회)` : "-";
        }

        function showToast(m, t) {
            const toast = document.getElementById('statusToast');
            document.getElementById('statusText').innerText = m;
            const icon = document.getElementById('statusIcon');
            if (t === 'success') icon.className = "w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_#10b981]";
            else if (t === 'error') icon.className = "w-2.5 h-2.5 rounded-full bg-rose-400 shadow-[0_0_8px_#f43f5e]";
            else icon.className = "w-2.5 h-2.5 rounded-full bg-amber-400 animate-ping";
            toast.classList.remove('translate-y-20', 'opacity-0');
            if (t !== 'sync') setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2500);
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            searchTerm = e.target.value;
            renderAll();
        });

        // Initialize
        startApp();
    </script>
</body>
</html>
